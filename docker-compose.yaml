services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      STATUS_UPSTREAM: http://192.168.1.61:9109/status
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.routers.http-0-o4g480sgsw48g840kgwc0ko4.entryPoints=http
      - traefik.http.routers.http-0-o4g480sgsw48g840kgwc0ko4.middlewares=gzip
      - traefik.http.routers.http-0-o4g480sgsw48g840kgwc0ko4.rule=Host(`abhishekdoesstuff.com`) && PathPrefix(`/`)
      - traefik.http.routers.http-0-o4g480sgsw48g840kgwc0ko4.service=http-0-o4g480sgsw48g840kgwc0ko4
      - traefik.http.services.http-0-o4g480sgsw48g840kgwc0ko4.loadbalancer.server.port=3000

networks:
  coolify:
    external: true
